name: frontend CI

on:
  workflow_dispatch:
  push:
    paths:
      - "bugsense-frontend/**"
    branches:
      - main
      - frontend-ui
      - github-workflow

  pull_request:
    paths:
      - "bugsense-frontend/**"

defaults:
  run:
    working-directory: bugsense-frontend

jobs:
  ci:
    name: Install, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build
        run: npm run build

      - name: Success
        run: echo "frontend ci passed successfully!
