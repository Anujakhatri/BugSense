name: Backend CI

on:
  workflow_dispatch:
  push:
    paths:
      - "bugsense_backend/**"
    branches:
      - main
      - system-in-backend
      - github-workflow

  pull_request:
    paths:
      - "bugsense_backend/**"

defaults:
  run:
    working-directory: bugsense_backend

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: bugsense_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy pytest pytest-cov

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports

      - name: Run tests with pytest
        run: |
          pytest --tb=short --cov=. --cov-report=term-missing

      - name: Success
        run: echo "backend ci passed successfully!"